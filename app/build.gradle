dependencies {
    implementation 'com.android.support:multidex:1.0.3'
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'com.android.support:appcompat-v7:28.0.0'
    implementation 'com.android.support.constraint:constraint-layout:1.1.3'
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'com.android.support.test:runner:1.0.2'
    androidTestImplementation 'com.android.support.test.espresso:espresso-core:3.0.2'
    implementation files('libs/BaiduLBS_Android.jar')
    implementation 'com.sun.mail:android-mail:1.6.0'
    implementation 'com.sun.mail:android-activation:1.6.0'
    implementation files('libs/httpclient-4.5.9.jar')
    implementation 'com.squareup.okhttp3:okhttp:3.10.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:3.10.0'
    // 若使用annotation需要单独引用,对于tinker的其他库都无需再引用
    //    provided("com.tinkerpatch.tinker:tinker-android-anno:1.9.13.3")
    //无需引入tinker的任何库,使用tinkerpatch sdk即可
    implementation 'com.tinkerpatch.sdk:tinkerpatch-android-sdk:1.2.13.3'
    implementation files('libs/tbs_sdk_thirdapp_v4.3.0.jar')
    debugApi 'com.squareup.leakcanary:leakcanary-android:1.6.2'
    releaseApi 'com.squareup.leakcanary:leakcanary-android-no-op:1.6.2'
    implementation files('libs/commons-io-2.4.jar')
    //    implementation 'com.lahm.library:easy-protector-release:latest.release'
    implementation 'com.tbruyelle.rxpermissions2:rxpermissions:0.9.5@aar'
    implementation 'io.reactivex.rxjava2:rxjava:2.0.1'
    implementation 'io.reactivex.rxjava2:rxandroid:2.0.1'
    implementation 'net.zetetic:android-database-sqlcipher:4.3.0@aar'
    implementation('androidx.sqlite:sqlite:2.0.1') {
        exclude group: 'androidx.annotation', module: 'annotation'
    }
    implementation 'com.github.tysj78:didi2_library:1.0'
    //    implementation 'com.android.support:cardview-v7:28.0.0'
    //    implementation 'com.android.support:recyclerview-v7:28.0.0'
    implementation files('libs/xposed82.jar')
    implementation 'com.github.0xZhangKe:ZLog:3.0'


}

