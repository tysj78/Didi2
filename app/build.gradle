//                                 '--set-max-idx-number=50000', // 每个包内方法数上限
//                                 '--main-dex-list=' + 'multidex.keep', // 打包到主classes.dex的文件列表
//                                 '--minimal-main-dex'
//        ]
//    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    sourceSets {
        main {
            jniLibs.srcDir 'libs'
            jni.srcDirs = []    //disable automatic ndk-build
        }
    }

